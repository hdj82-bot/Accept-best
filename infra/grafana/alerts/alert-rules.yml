apiVersion: 1

groups:
  - orgId: 1
    name: academi-critical
    folder: academi.ai
    interval: 1m
    rules:
      - uid: academi-5xx-high
        title: "High 5xx error rate (>5% for 5m)"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: "100 * sum(rate(http_requests_total{job=\"backend\",status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_requests_total{job=\"backend\"}[5m])), 0.001) > 5"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Backend 5xx rate exceeds 5% for 5m"
        labels:
          severity: critical

      - uid: academi-api-latency
        title: "API p95 latency > 2s for 10m"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: prometheus
            model:
              expr: "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"backend\"}[5m]))) > 2"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "API p95 latency exceeds 2s for 10m"
        labels:
          severity: warning

      - uid: academi-db-conn
        title: "DB connections > 85% of max"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: "sum(pg_stat_activity_count) / pg_settings_max_connections > 0.85"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Postgres connections above 85% of max"
        labels:
          severity: warning

      - uid: academi-queue-backlog
        title: "Celery queue depth > 500 for 10m"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: prometheus
            model:
              expr: "max(celery_queue_length) > 500"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Celery queue depth > 500 for 10m"
        labels:
          severity: warning

      - uid: academi-celery-failure-rate
        title: "Celery task failure rate > 10% for 5m"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: "100 * sum(rate(celery_tasks_total{state=\"FAILURE\"}[5m])) / clamp_min(sum(rate(celery_tasks_total[5m])), 0.001) > 10"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Celery task failure rate exceeds 10%"
        labels:
          severity: critical

      - uid: academi-celery-task-latency
        title: "Celery task p95 runtime > 60s"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: "histogram_quantile(0.95, sum by (le) (rate(celery_task_runtime_seconds_bucket[5m]))) > 60"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Celery task p95 runtime exceeds 60s"
        labels:
          severity: warning

      - uid: academi-redis-memory
        title: "Redis memory > 80% of maxmemory"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: "redis_memory_used_bytes / redis_memory_max_bytes > 0.80"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Redis memory usage above 80% of maxmemory"
        labels:
          severity: warning

      - uid: academi-redis-connection-spike
        title: "Redis connected clients > 200"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: "redis_connected_clients > 200"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Redis client connections exceed 200"
        labels:
          severity: warning

      - uid: academi-container-restart
        title: "Container restart loop detected"
        condition: A
        data:
          - refId: A
            relativeTimeRange: {from: 900, to: 0}
            datasourceUid: prometheus
            model:
              expr: "increase(container_restart_count{name=~\"academi.*\"}[15m]) > 3"
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "Container restarted 3+ times in 15m"
        labels:
          severity: critical
