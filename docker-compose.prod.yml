version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/backups:/backups
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-academi}
      POSTGRES_USER: ${POSTGRES_USER:-academi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-academi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192m

  backend:
    image: ${DOCKERHUB_USERNAME}/academi-backend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-collect:
    image: ${DOCKERHUB_USERNAME}/academi-backend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker -Q collect --concurrency 2 --loglevel=info
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m

  celery-process:
    image: ${DOCKERHUB_USERNAME}/academi-backend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker -Q process --concurrency 4 --loglevel=info
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m

  celery-beat:
    image: ${DOCKERHUB_USERNAME}/academi-backend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks beat --loglevel=info
    restart: always

  frontend:
    image: ${DOCKERHUB_USERNAME}/academi-frontend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: always

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  pg_data:
  redis_data:
  certbot_www:
  certbot_certs:
  prometheus_data:
