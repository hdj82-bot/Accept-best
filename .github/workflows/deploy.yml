name: Deploy

on:
  push:
    branches: [main]

jobs:
  # CI 통과 후에만 배포
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/academi-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/academi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/academi-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/academi-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_IMP_MERCHANT_ID=${{ secrets.NEXT_PUBLIC_IMP_MERCHANT_ID }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/academi.ai

            # 현재 이미지 태그 저장 (롤백용)
            PREV_TAG=$(cat .current-tag 2>/dev/null || echo "none")
            echo "${{ github.sha }}" > .current-tag

            # 새 이미지로 배포
            export IMAGE_TAG=${{ github.sha }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # DB 마이그레이션
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

            # 헬스체크 (최대 60초 대기)
            echo "Waiting for backend health check..."
            for i in $(seq 1 12); do
              if docker compose -f docker-compose.prod.yml exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null; then
                echo "Backend is healthy!"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "Health check failed — rolling back to $PREV_TAG"
                if [ "$PREV_TAG" != "none" ]; then
                  export IMAGE_TAG=$PREV_TAG
                  docker compose -f docker-compose.prod.yml pull
                  docker compose -f docker-compose.prod.yml up -d
                  echo "$PREV_TAG" > .current-tag
                fi
                exit 1
              fi
              sleep 5
            done

            # 오래된 이미지 정리
            docker image prune -f
